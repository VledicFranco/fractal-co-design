name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for npm OIDC trusted publishing.
permissions:
  contents: write       # changesets/action commits version bumps + creates GH releases
  pull-requests: write  # opens the "Version Packages" PR
  id-token: write       # mints OIDC token npm uses to verify the publisher

concurrency:
  group: release
  cancel-in-progress: false   # never cancel a publish mid-flight

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so changesets can derive previous tags / changelog
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing (OIDC) requires Node ≥ 22.14.0 + npm ≥ 11.5.1.
          # 22.x ships npm 10.x by default — we explicitly upgrade npm below.
          node-version: '22'
          cache: 'pnpm'
          # Ensure publishes use the public registry; OIDC requires this URL.
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11.11.0 from tarball (OIDC trusted publishing)
        # OIDC trusted publishing requires npm >= 11.5.1. The npm 10.9.7
        # bundled with Node 22.22.2 has a broken module tree
        # (missing promise-retry in @npmcli/arborist), so any operation
        # that touches the rebuild path (incl. `npm install -g npm`,
        # even with --force) crashes with MODULE_NOT_FOUND.
        # Workaround: download the npm tarball directly and replace the
        # broken bundle wholesale. This bypasses the broken in-place
        # install entirely.
        # See: https://github.com/actions/runner-images/issues/13883
        run: |
          set -euo pipefail
          NPM_VERSION="11.11.0"
          # `which npm` is a symlink in /bin → resolve to the cli script,
          # then dirname dirname gives the actual npm install directory:
          # /opt/hostedtoolcache/node/<v>/x64/lib/node_modules/npm
          NPM_PATH=$(dirname $(dirname $(readlink -f $(which npm))))
          echo "Before: npm --version = $(npm --version) at $NPM_PATH"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VERSION}.tgz" -o /tmp/npm.tgz
          rm -rf "$NPM_PATH"
          mkdir -p "$NPM_PATH"
          tar -xzf /tmp/npm.tgz -C "$NPM_PATH" --strip-components=1
          rm /tmp/npm.tgz
          echo "After:  npm --version = $(npm --version) at $NPM_PATH"
          # Sanity: the new npm must be ≥ 11.5.1 for OIDC trusted publishing
          node -e "const v=process.argv[1].split('.').map(Number); if(v[0]<11||(v[0]===11&&v[1]<5)) {console.error('npm', v.join('.'),'is too old for OIDC');process.exit(1)}" "$(npm --version)"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      # Two modes — handled by changesets/action automatically:
      #   1. Pending changesets present in main → opens/updates "Version Packages" PR
      #      (does NOT publish; waits for the PR to be merged).
      #   2. No pending changesets → runs `publish` script, which calls
      #      `changeset publish` to push any package whose version is ahead of npm.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # npm OIDC — no NPM_TOKEN needed. The `id-token: write` permission
          # above lets npm verify this workflow as the trusted publisher
          # (configured per-package in npm's web UI: Settings → Publishing
          # → "Trusted Publishers" → add owner=VledicFranco,
          # repo=fractal-co-design, workflow=.github/workflows/release.yml).
          NPM_CONFIG_PROVENANCE: true
