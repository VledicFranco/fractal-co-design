name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm --filter @fractal-co-design/docs build

      - name: Typecheck docs site
        run: pnpm --filter @fractal-co-design/docs typecheck

      - name: Build fca-index
        run: pnpm --filter @fractal-co-design/fca-index build

      - name: Test fca-index
        run: pnpm --filter @fractal-co-design/fca-index test
